<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: wss:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com https://translate.google.com https://translate.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://translate.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https: https://www.gstatic.com; connect-src 'self' https: wss: https://translate.googleapis.com; object-src 'none'; base-uri 'none'; frame-ancestors 'none';" />
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Student-Alumni Connect Platform - Connect, Collaborate, and Grow Together"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>AlumniConnect - Student-Alumni Platform</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    
    <!-- Stateful Google Translate Integration -->
    <div id="google_translate_element" style="display: none;"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en', 
          autoDisplay: false,
          includedLanguages: 'en,es,fr,de,zh-CN,ja,hi,bn,te,mr,ta,ur,gu,kn,or,ml,pa,as,mai,sd,ne,sa,gom,doi,brx,ks,sat,ar,ru,pt,it,ko'
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <div id="root"></div>
  </body>
</html>
